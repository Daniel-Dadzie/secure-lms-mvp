name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: secure_lms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/secure_lms_test
      JWT_ACCESS_SECRET: ci-test-access-secret-not-for-production
      JWT_REFRESH_SECRET: ci-test-refresh-secret-not-for-production
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      NODE_ENV: test
      CLIENT_URL: http://localhost:3000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspaces --if-present

      - name: Generate Prisma Client
        run: npx prisma generate --config prisma/prisma.config.ts
        working-directory: server

      - name: Run database migrations
        run: npx prisma migrate deploy --config prisma/prisma.config.ts
        working-directory: server

      - name: Build
        run: npm run build --workspaces --if-present

      - name: Run tests
        run: npm run test --workspaces --if-present

      - name: Dependency vulnerability scan
        run: npm audit --audit-level=high || true
        