name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: secure_lms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/secure_lms_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Configure test environment
        run: |
          echo "JWT_ACCESS_SECRET=$(openssl rand -hex 64)" >> "$GITHUB_ENV"
          echo "JWT_REFRESH_SECRET=$(openssl rand -hex 64)" >> "$GITHUB_ENV"
          echo "JWT_ACCESS_EXPIRES_IN=15m" >> "$GITHUB_ENV"
          echo "JWT_REFRESH_EXPIRES_IN=7d" >> "$GITHUB_ENV"
          echo "NODE_ENV=test" >> "$GITHUB_ENV"
          echo "CLIENT_URL=http://localhost:3000" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspaces --if-present

      - name: Generate Prisma Client
        run: npx prisma generate  --config prisma/prisma.config.ts
        working-directory: server

      - name: Run database migrations
        run: npx prisma migrate deploy --config prisma/prisma.config.ts
        working-directory: server

      - name: Build
        run: npm run build --workspaces --if-present

      - name: Run tests
        run: npm run test --workspaces --if-present

      - name: Dependency vulnerability scan
        run: npm audit --audit-level=critical
        continue-on-error: true
