# Cybersecurity Team — Week 1 DevSecOps Pipeline
# Secure LMS MVP
#
# Repo layout: npm workspaces monorepo — root package.json/package-lock.json,
# with workspaces at client/, server/, and packages/shared/.
#
# This workflow is additive to the Web Development team's CI pipeline
# (lint/build/test) and focuses purely on security gates:
#   1. Secret scanning        (Gitleaks)
#   2. Dependency scanning     (npm audit — client, server, packages/shared workspaces)
#   3. Static analysis (SAST)  (Semgrep — non-blocking in Week 1-2, blocking from Week 3)
#
# Runs on every push and pull request targeting main/develop.

name: Security Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: read

jobs:
  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
        # A detected secret fails this job (blocking merge).
        # Do NOT add secrets to the allowlist to "fix" a failure —
        # rotate the credential first, then remove it from history.

  dependency-scan:
    name: Dependency Scanning (npm audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        # Single install at the repo root — npm workspaces resolves
        # client, server and packages/shared together from the one lockfile.
        run: npm ci

      - name: Audit client workspace
        id: audit_client
        continue-on-error: true
        # Fails this step on any high-or-higher vulnerability.
        # Adjust --audit-level as the team agrees a tolerance in Week 2 triage.
        run: npm audit --workspace=client --omit=dev --audit-level=high

      - name: Audit server workspace
        id: audit_server
        continue-on-error: true
        run: npm audit --workspace=server --omit=dev --audit-level=high

      - name: Audit packages/shared workspace
        id: audit_shared
        continue-on-error: true
        run: npm audit --workspace=packages/shared --omit=dev --audit-level=high

      - name: Fail job if any workspace audit failed
        if: >-
          steps.audit_client.outcome == 'failure' ||
          steps.audit_server.outcome == 'failure' ||
          steps.audit_shared.outcome == 'failure'
        run: |
          echo "One or more workspace dependency audits failed — see the failed step(s) above for which workspace and package."
          exit 1

  sast-scan:
    name: Static Analysis (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/javascript
            p/typescript
            p/expressjs
            p/react
        env:
          # Week 1-2: findings are reported but do not block merges while the
          # team tunes out false positives. Flip to a hard fail (remove this
          # env var) from Week 3 onward per the Security Test Plan.
          SEMGREP_SEND_METRICS: "off"
        continue-on-error: true

  summary:
    name: Security Pipeline Summary
    runs-on: ubuntu-latest
    needs: [secret-scan, dependency-scan, sast-scan]
    if: always()
    steps:
      - name: Report status
        run: |
          echo "Secret scan:      ${{ needs.secret-scan.result }}"
          echo "Dependency scan:  ${{ needs.dependency-scan.result }}"
          echo "SAST (Semgrep):   ${{ needs.sast-scan.result }}"
          if [ "${{ needs.secret-scan.result }}" != "success" ] || [ "${{ needs.dependency-scan.result }}" != "success" ]; then
            echo "Blocking security gate failed — see failed job(s) above."
            exit 1
          fi
