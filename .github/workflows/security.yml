# Cybersecurity Team — Week 1 DevSecOps Pipeline
# Secure LMS MVP
#
# Repo layout: npm workspaces monorepo — root package.json/package-lock.json,
# with workspaces at client/, server/, and packages/shared/.
#
# This workflow is additive to the Web Development team's CI pipeline
# (lint/build/test) and focuses purely on security gates:
#   1. Secret scanning        (Gitleaks)
#   2. Dependency scanning     (npm audit — client, server, packages/shared workspaces)
#   3. Static analysis (SAST)  (Semgrep — non-blocking in Week 1-2, blocking from Week 3)
#
# Runs on every push and pull request targeting main/develop.

name: Security Pipeline

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret Scanning - Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: "false"

  dependency-scan:
    name: Dependency Scanning - npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Verify package lock
        run: |
          test -f package-lock.json || {
            echo "package-lock.json was not found."
            exit 1
          }

      - name: Audit client workspace
        id: audit_client
        continue-on-error: true
        run: >
          npm audit
          --workspace=client
          --omit=dev
          --audit-level=high
          --package-lock-only

      - name: Audit server workspace
        id: audit_server
        continue-on-error: true
        run: >
          npm audit
          --workspace=server
          --omit=dev
          --audit-level=high
          --package-lock-only

      - name: Audit shared workspace
        id: audit_shared
        continue-on-error: true
        run: >
          npm audit
          --workspace=packages/shared
          --omit=dev
          --audit-level=high
          --package-lock-only

      - name: Enforce dependency security gate
        if: always()
        run: |
          CLIENT_RESULT="${{ steps.audit_client.outcome }}"
          SERVER_RESULT="${{ steps.audit_server.outcome }}"
          SHARED_RESULT="${{ steps.audit_shared.outcome }}"

          echo "Client audit: $CLIENT_RESULT"
          echo "Server audit: $SERVER_RESULT"
          echo "Shared audit: $SHARED_RESULT"

          if [ "$CLIENT_RESULT" != "success" ] ||
             [ "$SERVER_RESULT" != "success" ] ||
             [ "$SHARED_RESULT" != "success" ]; then
            echo "One or more workspaces contain a blocking dependency finding."
            exit 1
          fi

  sast-scan:
    name: Static Analysis - Semgrep
    runs-on: ubuntu-latest
    timeout-minutes: 20

    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Run Semgrep
        continue-on-error: true
        run: |
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/javascript \
            --config p/typescript \
            --config p/expressjs \
            --config p/react \
            --error \
            .
        env:
          SEMGREP_SEND_METRICS: "off"

  summary:
    name: Security Pipeline Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5

    needs:
      - secret-scan
      - dependency-scan
      - sast-scan

    if: always()

    steps:
      - name: Report security status
        run: |
          SECRET_RESULT="${{ needs.secret-scan.result }}"
          DEPENDENCY_RESULT="${{ needs.dependency-scan.result }}"
          SAST_RESULT="${{ needs.sast-scan.result }}"

          echo "Secret scan:     $SECRET_RESULT"
          echo "Dependency scan: $DEPENDENCY_RESULT"
          echo "SAST scan:       $SAST_RESULT"

          if [ "$SECRET_RESULT" != "success" ]; then
            echo "Secret scanning failed or did not complete."
            exit 1
          fi

          if [ "$DEPENDENCY_RESULT" != "success" ]; then
            echo "Dependency scanning failed or found a blocking issue."
            exit 1
          fi

          echo "Blocking Week 1 security gates passed."
          echo "Semgrep remains non-blocking during Weeks 1-2 while rules are tuned."
